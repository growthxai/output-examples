name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install (frozen lockfile)
        run: npm ci

      - name: Build
        run: npm run output:worker:build

      - name: Lint
        run: npm run lint
